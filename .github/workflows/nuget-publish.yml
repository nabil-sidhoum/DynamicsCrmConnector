name: Publish individual NuGet package

on:
  push:
    branches: [ "main" ]   # Lance les tests à chaque push sur main
    tags:
      - 'crm-v*'
      - 'extensions-v*'

jobs:
  # 1. Tests — tournent sur chaque push main ET sur chaque tag
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Tests
        run: dotnet test src/Tools.DynamicsCRM.Tests/Tools.DynamicsCRM.Tests.csproj -c Release

  # 2. Publication Tools.DynamicsCRM — bloquée si tests KO
  publish-crm:
    needs: tests
    if: startsWith(github.ref, 'refs/tags/crm-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build
        run: |
          dotnet restore src/Tools.sln
          dotnet build src/Tools.sln --configuration Release --no-restore

      - name: Pack Tools.DynamicsCRM
        run: dotnet pack src/Tools.DynamicsCRM/Tools.DynamicsCRM.csproj --configuration Release --no-build --output ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

  # 3. Publication Tools.DynamicsCRM.Extensions — bloquée si tests KO
  publish-extensions:
    needs: tests
    if: startsWith(github.ref, 'refs/tags/extensions-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build
        run: |
          dotnet restore src/Tools.sln
          dotnet build src/Tools.sln --configuration Release --no-restore

      - name: Pack Tools.DynamicsCRM.Extensions
        run: dotnet pack src/Tools.DynamicsCRM.Extensions/Tools.DynamicsCRM.Extensions.csproj --configuration Release --no-build --output ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json